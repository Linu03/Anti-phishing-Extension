services:
  db:
    image: postgres:16-alpine
    container_name: afs-postgres
    environment:
      POSTGRES_USER: afs
      POSTGRES_PASSWORD: afs
      POSTGRES_DB: afs
    ports:
      - "5432:5432"
    volumes:
      - afs_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afs -d afs"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  afs_pgdata:
